<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ShipTrack Pro</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body { background: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--white); border-radius: 14px; width: 100%; max-width: 400px; padding: 2.5rem; box-shadow: 0 24px 80px rgba(0,0,0,.4); }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .brand { font-size: 1.4rem; font-weight: 800; color: var(--ink); letter-spacing: -.02em; }
    .login-logo .dot { color: var(--steel); }
    .login-logo p { color: var(--ink-3); font-size: .85rem; margin-top: .25rem; }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #7f1d1d; border-radius: 8px; padding: .75rem 1rem; font-size: .85rem; margin-bottom: 1.25rem; }
    h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="brand"><span class="dot">▶</span> ShipTrack Pro</div>
      <p>Staff Portal</p>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none">Invalid email or password. Please try again.</div>

    <form action="/auth/login" method="POST">
      <div class="form-group" style="margin-bottom:1rem">
        <label>Email address</label>
        <input type="text" name="email" placeholder="admin@company.com" required autocomplete="username" />
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.875rem">Sign in</button>
    </form>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('error')) document.getElementById('errorMsg').style.display = 'block';
  </script>
</body>
</html>
